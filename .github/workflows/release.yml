# .github/workflows/release.yml
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Create release zip
        run: npm run zip

      - name: Upload zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/uppa-base-*.zip
          generate_release_notes: true

      - name: Deploy to WordPress.org Theme SVN
        # Only runs when SVN credentials are configured as repository secrets.
        # The theme must be approved by WP.org before this step is useful.
        # themes.svn.wordpress.org is the correct host for themes (not plugins).
        if: ${{ secrets.SVN_USERNAME != '' && secrets.SVN_PASSWORD != '' }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SVN_URL="https://themes.svn.wordpress.org/uppa-base"
          SVN_DIR="/tmp/uppa-base-svn"

          echo "Checking out SVN trunk..."
          svn checkout --depth immediates "$SVN_URL" "$SVN_DIR"
          svn update --set-depth infinity "$SVN_DIR/trunk"

          echo "Syncing build to trunk..."
          rsync -rc --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="vendor" \
            --exclude="release" \
            --exclude="scripts" \
            --exclude="assets/css/src" \
            --exclude="assets/js/src" \
            --exclude="package*.json" \
            --exclude=".nvmrc" \
            --exclude=".editorconfig" \
            --exclude="phpcs.xml" \
            --exclude="eslint.config.js" \
            --exclude=".stylelintrc.json" \
            ./ "$SVN_DIR/trunk/"

          echo "Adding new files to SVN..."
          svn add --force "$SVN_DIR/trunk" --auto-props --parents --depth infinity -q

          echo "Removing deleted files from SVN..."
          svn status "$SVN_DIR" | grep "^!" | awk '{print $2}' | xargs -r svn delete

          echo "Tagging version $VERSION..."
          svn copy "$SVN_DIR/trunk" "$SVN_DIR/tags/$VERSION"

          echo "Committing..."
          svn commit "$SVN_DIR" \
            --username "${{ secrets.SVN_USERNAME }}" \
            --password "${{ secrets.SVN_PASSWORD }}" \
            --no-auth-cache \
            --non-interactive \
            -m "Release $VERSION"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
